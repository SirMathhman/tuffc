# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: local
    hooks:
      - id: cargo-test
        name: cargo test (100% coverage)
        entry: cargo llvm-cov --fail-under-lines 100
        language: system
        pass_filenames: false
      - id: pmd-cpd
        name: pmd cpd
        entry: pmd cpd --dir src --language rust --minimum-tokens 35 --ignore-literals --ignore-identifiers
        language: system
        pass_filenames: false
